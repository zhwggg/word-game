const $ = (id) => document.getElementById(id);

let isAudioOn = true;
let audioContext;

function initAudio() {
  if (!audioContext) {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioContext.state === "suspended") {
    audioContext.resume();
  }
}

function playCorrectSound() {
  if (!isAudioOn || !audioContext) return;
  const osc = audioContext.createOscillator();
  const gain = audioContext.createGain();
  osc.connect(gain);
  gain.connect(audioContext.destination);
  
  osc.frequency.setValueAtTime(440, audioContext.currentTime);
  osc.frequency.exponentialRampToValueAtTime(880, audioContext.currentTime + 0.1);
  gain.gain.setValueAtTime(0.3, audioContext.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
  
  osc.start(audioContext.currentTime);
  osc.stop(audioContext.currentTime + 0.3);
}

function playShootSound() {
  if (!isAudioOn || !audioContext) return;
  const osc = audioContext.createOscillator();
  const gain = audioContext.createGain();
  osc.connect(gain);
  gain.connect(audioContext.destination);
  
  osc.type = "sawtooth";
  osc.frequency.setValueAtTime(800, audioContext.currentTime);
  osc.frequency.exponentialRampToValueAtTime(200, audioContext.currentTime + 0.1);
  gain.gain.setValueAtTime(0.2, audioContext.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
  
  osc.start(audioContext.currentTime);
  osc.stop(audioContext.currentTime + 0.1);
}

function playBoomSound() {
  if (!isAudioOn || !audioContext) return;
  const bufferSize = audioContext.sampleRate * 0.3;
  const buffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
  const data = buffer.getChannelData(0);
  
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2);
  }
  
  const source = audioContext.createBufferSource();
  const gain = audioContext.createGain();
  source.buffer = buffer;
  source.connect(gain);
  gain.connect(audioContext.destination);
  
  gain.gain.setValueAtTime(0.4, audioContext.currentTime);
  source.start(audioContext.currentTime);
}

function playOverSound() {
  if (!isAudioOn || !audioContext) return;
  const osc = audioContext.createOscillator();
  const gain = audioContext.createGain();
  osc.connect(gain);
  gain.connect(audioContext.destination);
  
  osc.frequency.setValueAtTime(440, audioContext.currentTime);
  osc.frequency.exponentialRampToValueAtTime(110, audioContext.currentTime + 0.5);
  gain.gain.setValueAtTime(0.3, audioContext.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
  
  osc.start(audioContext.currentTime);
  osc.stop(audioContext.currentTime + 0.5);
}

function toggleAudio() {
  initAudio();
  isAudioOn = !isAudioOn;
  localStorage.setItem("audioOn", isAudioOn);
  const btn = $("audioBtn");
  if (isAudioOn) {
    btn.textContent = "🔊 音效：已开启";
    btn.classList.remove("off");
    setTimeout(() => playCorrectSound(), 50);
  } else {
    btn.textContent = "🔇 音效：已关闭";
    btn.classList.add("off");
  }
}

let currentLevel = 1;
let totalWordScore = 0;
let currentLevelWords = [];
let currentWordIndex = 0;
let currentLevelCorrect = 0;
let gameAllWords = [];
let errorWords = [];
let isReviewMode = false;
let isBossMode = false;
let totalRoundKill = 0;
let usedWordKeys = [];
let alreadyScoredLevels = [];

function shuffleArray(array) {
  const newArr = [...array];
  for (let i = newArr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
  }
  return newArr;
}

function initGameRound() {
  currentLevel = 1;
  totalWordScore = 0;
  totalRoundKill = 0;
  errorWords = [];
  isReviewMode = false;
  isBossMode = false;
  alreadyScoredLevels = [];

  let availableWords = fullJunior1WordList.filter(word => !usedWordKeys.includes(word.e));
  if (availableWords.length < 50) {
    availableWords = [...fullJunior1WordList];
    usedWordKeys = [];
  }
  gameAllWords = shuffleArray(availableWords).slice(0, 50);
  gameAllWords.forEach(word => usedWordKeys.push(word.e));

  loadLevelWords();
  updateUI();
}

function loadLevelWords() {
  const startIndex = (currentLevel - 1) * 5;
  currentLevelWords = gameAllWords.slice(startIndex, startIndex + 5);
  currentWordIndex = 0;
  currentLevelCorrect = 0;
  $("startGameBtn").disabled = true;
  showCurrentWord();
  $("tipText").textContent = `第${currentLevel}关，请拼写单词，答对≥4个解锁游戏`;
  updateUI();
}

function loadReviewWords() {
  isReviewMode = true;
  currentLevelWords = [...errorWords];
  currentWordIndex = 0;
  currentLevelCorrect = 0;
  $("startGameBtn").disabled = true;
  showCurrentWord();
  $("tipText").textContent = `错词重练：共${currentLevelWords.length}个单词，需全部拼写正确`;
  updateUI();
}

function showCurrentWord() {
  $("chineseText").textContent = currentLevelWords[currentWordIndex].c;
  $("wordInput").value = "";
  $("wordInput").focus();
  updateUI();
}

function updateUI() {
  $("levelNum").textContent = currentLevel;
  $("correctNum").textContent = currentLevelCorrect;
  $("wordIndex").textContent = currentWordIndex;
  $("wordScore").textContent = totalWordScore;
  $("totalRoundKill").textContent = totalRoundKill;
}

function submitWord() {
  initAudio();
  const userInput = $("wordInput").value.trim().toLowerCase();
  const correctAnswer = currentLevelWords[currentWordIndex].e.toLowerCase();
  const currentWord = currentLevelWords[currentWordIndex];
  const isLastWord = (currentWordIndex === currentLevelWords.length - 1);

  if (userInput === correctAnswer) {
    currentLevelCorrect++;
    playCorrectSound();
    $("tipText").textContent = "✅ 拼写正确！";
    errorWords = errorWords.filter(word => word.e !== currentWord.e);
  } else {
    $("tipText").textContent = `❌ 拼写错误，正确答案：${correctAnswer}`;
    if (!isReviewMode && !errorWords.some(word => word.e === currentWord.e)) {
      errorWords.push(currentWord);
    }
  }

  currentWordIndex++;

  if (currentWordIndex >= currentLevelWords.length) {
    setTimeout(() => {
      finishWordRound();
    }, 1000);
    return;
  }

  if (userInput !== correctAnswer && isLastWord) {
    setTimeout(() => {
      showCurrentWord();
    }, 1000);
  } else {
    showCurrentWord();
  }
}

function finishWordRound() {
  if (isReviewMode) {
    if (currentLevelCorrect === currentLevelWords.length) {
      $("tipText").textContent = "🎉 错词全部掌握！即将进入最终BOSS战";
      setTimeout(() => {
        startBossGame();
      }, 1500);
    } else {
      $("tipText").textContent = `😢 还有单词未掌握，请重新重练`;
      setTimeout(() => {
        loadReviewWords();
      }, 1500);
    }
    return;
  }

  if (currentLevelCorrect >= 4) {
    if (!alreadyScoredLevels.includes(currentLevel)) {
      totalWordScore += currentLevelCorrect;
      alreadyScoredLevels.push(currentLevel);
    }
    $("tipText").textContent = `🎉 本关答对${currentLevelCorrect}个，达标！可以开始游戏`;
    $("startGameBtn").disabled = false;
  } else {
    $("tipText").textContent = `😢 本关仅答对${currentLevelCorrect}个，未达标，请重学本组单词`;
    setTimeout(() => {
      loadLevelWords();
    }, 1500);
  }
  updateUI();
}

$("wordInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") submitWord();
});

function loadBestScore() {
  $("bestKill").textContent = localStorage.getItem("bestKillScore") || 0;
}

function saveBestScore(killNum) {
  const oldBest = Number(localStorage.getItem("bestKillScore") || 0);
  if (killNum > oldBest) {
    localStorage.setItem("bestKillScore", killNum);
    loadBestScore();
  }
}

function initStars() {
  stars = [];
  for (let i = 0; i < 80; i++) {
    stars.push({
      x: Math.random() * canvasW,
      y: Math.random() * canvasH,
      size: Math.random() * 2 + 0.5,
      speed: Math.random() * 1 + 0.3
    });
  }
}

function drawStars() {
  ctx.fillStyle = "#ffffff";
  stars.forEach(star => {
    star.y += star.speed;
    if (star.y > canvasH) {
      star.y = 0;
      star.x = Math.random() * canvasW;
    }
    ctx.globalAlpha = Math.random() * 0.8 + 0.2;
    ctx.fillRect(star.x, star.y, star.size, star.size);
  });
  ctx.globalAlpha = 1;
}

function drawPlayer(x, y, w, h) {
  ctx.fillStyle = "#00aaff";
  ctx.beginPath();
  ctx.moveTo(x + w/2, y);
  ctx.lineTo(x + w*0.35, y + h*0.4);
  ctx.lineTo(x + w*0.1, y + h*0.45);
  ctx.lineTo(x + w*0.3, y + h*0.65);
  ctx.lineTo(x + w*0.35, y + h*0.9);
  ctx.lineTo(x + w*0.65, y + h*0.9);
  ctx.lineTo(x + w*0.7, y + h*0.65);
  ctx.lineTo(x + w*0.9, y + h*0.45);
  ctx.lineTo(x + w*0.65, y + h*0.4);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = "#ccf5ff";
  ctx.beginPath();
  ctx.ellipse(x + w/2, y + h*0.2, w*0.15, h*0.12, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = "#333333";
  ctx.fillRect(x + w*0.4, y + h*0.05, w*0.08, h*0.1);
  ctx.fillRect(x + w*0.52, y + h*0.05, w*0.08, h*0.1);
  ctx.fillStyle = "#66d4ff";
  ctx.fillRect(x + w*0.1, y + h*0.45, w*0.25, h*0.03);
  ctx.fillRect(x + w*0.65, y + h*0.45, w*0.25, h*0.03);
}

function drawEnemy(x, y, w, h) {
  ctx.fillStyle = "#ff4444";
  ctx.beginPath();
  ctx.moveTo(x + w/2, y + h);
  ctx.lineTo(x + w*0.35, y + h*0.6);
  ctx.lineTo(x + w*0.1, y + h*0.55);
  ctx.lineTo(x + w*0.3, y + h*0.35);
  ctx.lineTo(x + w*0.35, y);
  ctx.lineTo(x + w*0.65, y);
  ctx.lineTo(x + w*0.7, y + h*0.35);
  ctx.lineTo(x + w*0.9, y + h*0.55);
  ctx.lineTo(x + w*0.65, y + h*0.6);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = "#333333";
  ctx.beginPath();
  ctx.ellipse(x + w/2, y + h*0.8, w*0.15, h*0.12, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = "#222222";
  ctx.fillRect(x + w*0.4, y + h*0.85, w*0.08, h*0.1);
  ctx.fillRect(x + w*0.52, y + h*0.85, w*0.08, h*0.1);
}

function drawBoss(x, y, w, h) {
  ctx.fillStyle = "#aa2222";
  ctx.beginPath();
  ctx.moveTo(x + w/2, y + h);
  ctx.lineTo(x + w*0.2, y + h*0.7);
  ctx.lineTo(x, y + h*0.75);
  ctx.lineTo(x + w*0.25, y + h*0.3);
  ctx.lineTo(x + w*0.3, y);
  ctx.lineTo(x + w*0.7, y);
  ctx.lineTo(x + w*0.75, y + h*0.3);
  ctx.lineTo(x + w, y + h*0.75);
  ctx.lineTo(x + w*0.8, y + h*0.7);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = "#ffaaaa";
  ctx.beginPath();
  ctx.ellipse(x + w/2, y + h*0.25, w*0.18, h*0.15, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = "#ff6666";
  ctx.fillRect(x, y + h*0.75, w*0.3, h*0.05);
  ctx.fillRect(x + w*0.7, y + h*0.75, w*0.3, h*0.05);
  const hpBarWidth = w;
  const hpBarHeight = 8;
  const hpPercent = (bossMaxHp - bossHitCount) / bossMaxHp;
  ctx.fillStyle = "#333333";
  ctx.fillRect(x, y - 20, hpBarWidth, hpBarHeight);
  ctx.fillStyle = "#ff0000";
  ctx.fillRect(x, y - 20, hpBarWidth * hpPercent, hpBarHeight);
  ctx.fillStyle = "#ffffff";
  ctx.font = "12px Microsoft YaHei";
  ctx.fillText(`${bossMaxHp - bossHitCount}/${bossMaxHp}`, x + w/2 - 15, y - 25);
}

function addBoom(x, y, maxRadius = 30) {
  booms.push({
    x: x,
    y: y,
    radius: 5,
    maxRadius: maxRadius,
    alpha: 1,
    speed: 2
  });
}

function drawBooms() {
  booms.forEach((boom, index) => {
    const gradient = ctx.createRadialGradient(boom.x, boom.y, 0, boom.x, boom.y, boom.radius);
    gradient.addColorStop(0, "rgba(255, 255, 0, " + boom.alpha + ")");
    gradient.addColorStop(0.5, "rgba(255, 100, 0, " + boom.alpha + ")");
    gradient.addColorStop(1, "rgba(255, 0, 0, " + boom.alpha * 0.3 + ")");
    
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(boom.x, boom.y, boom.radius, 0, Math.PI * 2);
    ctx.fill();
    boom.radius += boom.speed;
    boom.alpha -= 0.05;
    if (boom.alpha <= 0) {
      booms.splice(index, 1);
    }
  });
}

function startGame() {
  initAudio();
  $("mainUI").style.display = "none";
  $("gameCanvas").style.display = "block";
  
  canvas = $("gameCanvas");
  ctx = canvas.getContext("2d");
  initStars();
  booms = [];
  bullets = [];
  enemies = [];
  enemyBullets = [];
  boss = null;
  isBossMode = false;
  
  player = { x: 175, y: 500, w: 50, h: 60 };
  touchX = player.x + player.w / 2;
  killScore = 0;
  isGameRunning = true;
  lastShootTime = Date.now();
  gameStartTime = Date.now();
  gameLoop = setInterval(renderGame, 16);
  spawnEnemy();
  if (currentLevel >= 2) {
    startEnemyShoot();
  }
}

function startBossGame() {
  initAudio();
  $("mainUI").style.display = "none";
  $("gameCanvas").style.display = "block";
  
  canvas = $("gameCanvas");
  ctx = canvas.getContext("2d");
  initStars();
  booms = [];
  bullets = [];
  enemies = [];
  enemyBullets = [];
  isBossMode = true;
  bossHitCount = 0;
  
  boss = {
    x: canvasW / 2 - 75,
    y: 50,
    w: 150,
    h: 120,
    speed: 2,
    moveDirection: 1,
    lastShootTime: Date.now(),
    shootInterval: 800
  };
  
  player = { x: 175, y: 500, w: 50, h: 60 };
  touchX = player.x + player.w / 2;
  killScore = 0;
  isGameRunning = true;
  lastShootTime = Date.now();
  bossStartTime = Date.now();
  gameLoop = setInterval(renderBossGame, 16);
}

function spawnEnemy() {
  if (!isGameRunning || isBossMode) return;
  const maxEnemyCount = 5 + currentLevel;
  if (enemies.length < maxEnemyCount) {
    enemies.push({
      x: Math.random() * (canvasW - 45),
      y: -60,
      w: 45,
      h: 55,
      speed: 1.2 + (currentLevel * 0.25)
    });
  }
  const spawnInterval = Math.max(300, 700 - (currentLevel * 40));
  setTimeout(spawnEnemy, spawnInterval);
}

function startEnemyShoot() {
  if (!isGameRunning || isBossMode) return;
  enemies.forEach(enemy => {
    const shootRate = Math.max(1500, 2500 - (currentLevel * 200));
    if (Math.random() * 10000 < shootRate) {
      enemyBullets.push({
        x: enemy.x + enemy.w / 2 - 4,
        y: enemy.y + enemy.h,
        w: 8,
        h: 18,
        speed: 3 + (currentLevel * 0.3)
      });
    }
  });
  setTimeout(startEnemyShoot, 300);
}

function renderGame() {
  if (!isGameRunning || isBossMode) return;
  ctx.clearRect(0, 0, canvasW, canvasH);
  drawStars();
  drawPlayer(player.x, player.y, player.w, player.h);
  
  player.x = touchX - player.w / 2;
  if (player.x < 0) player.x = 0;
  if (player.x > canvasW - player.w) player.x = canvasW - player.w;

  enemies.forEach((enemy, index) => {
    enemy.y += enemy.speed;
    drawEnemy(enemy.x, enemy.y, enemy.w, enemy.h);
    if (enemy.y > canvasH) enemies.splice(index, 1);
  });

  const now = Date.now();
  if (now - lastShootTime > 150) {
    bullets.push({
      x: player.x + player.w / 2 - 3,
      y: player.y - 10,
      w: 6,
      h: 15,
      speed: 10
    });
    playShootSound();
    lastShootTime = now;
  }

  ctx.fillStyle = "#ffff00";
  bullets.forEach((bullet, index) => {
    bullet.y -= bullet.speed;
    ctx.fillRect(bullet.x, bullet.y, bullet.w, bullet.h);
    if (bullet.y < 0) bullets.splice(index, 1);
  });

  ctx.fillStyle = "#ff4444";
  enemyBullets.forEach((bullet, index) => {
    bullet.y += bullet.speed;
    ctx.fillRect(bullet.x, bullet.y, bullet.w, bullet.h);
    if (bullet.y > canvasH) enemyBullets.splice(index, 1);
  });

  enemies.forEach((enemy, enemyIdx) => {
    bullets.forEach((bullet, bulletIdx) => {
      if (
        bullet.x > enemy.x &&
        bullet.x < enemy.x + enemy.w &&
        bullet.y > enemy.y &&
        bullet.y < enemy.y + enemy.h
      ) {
        addBoom(enemy.x + enemy.w/2, enemy.y + enemy.h/2);
        playBoomSound();
        enemies.splice(enemyIdx, 1);
        bullets.splice(bulletIdx, 1);
        killScore++;
      }
    });
  });

  enemyBullets.forEach((bullet, index) => {
    if (
      bullet.x > player.x &&
      bullet.x < player.x + player.w &&
      bullet.y > player.y &&
      bullet.y < player.y + player.h
    ) {
      gameOver();
    }
  });

  enemies.forEach((enemy) => {
    if (
      enemy.x + enemy.w > player.x &&
      enemy.x < player.x + player.w &&
      enemy.y + enemy.h > player.y &&
      enemy.y < player.y + player.h
    ) {
      gameOver();
    }
  });

  drawBooms();
  ctx.fillStyle = "#fff";
  ctx.font = "16px Microsoft YaHei";
  ctx.fillText(`击落敌机：${killScore} 架`, 10, 30);
  ctx.fillText(`关卡：${currentLevel}/10`, 10, 55);
  const leftTime = Math.ceil((60000 - (Date.now() - gameStartTime)) / 1000);
  ctx.fillText(`剩余时间：${leftTime}s`, canvasW - 120, 30);
  if (Date.now() - gameStartTime > 60000) {
    gameOver(false);
  }
}

function renderBossGame() {
  if (!isGameRunning || !isBossMode) return;
  ctx.clearRect(0, 0, canvasW, canvasH);
  drawStars();
  drawPlayer(player.x, player.y, player.w, player.h);
  drawBoss(boss.x, boss.y, boss.w, boss.h);
  
  player.x = touchX - player.w / 2;
  if (player.x < 0) player.x = 0;
  if (player.x > canvasW - player.w) player.x = canvasW - player.w;

  boss.x += boss.speed * boss.moveDirection;
  if (boss.x <= 0 || boss.x + boss.w >= canvasW) {
    boss.moveDirection *= -1;
  }

  const now = Date.now();
  if (now - lastShootTime > 150) {
    bullets.push({
      x: player.x + player.w / 2 - 3,
      y: player.y - 10,
      w: 6,
      h: 15,
      speed: 10
    });
    playShootSound();
    lastShootTime = now;
  }

  ctx.fillStyle = "#ffff00";
  bullets.forEach((bullet, index) => {
    bullet.y -= bullet.speed;
    ctx.fillRect(bullet.x, bullet.y, bullet.w, bullet.h);
    if (bullet.y < 0) bullets.splice(index, 1);
  });

  if (now - boss.lastShootTime > boss.shootInterval) {
    enemyBullets.push({
      x: boss.x + boss.w * 0.3 - 4,
      y: boss.y + boss.h,
      w: 10,
      h: 22,
      speed: 4.5
    });
    enemyBullets.push({
      x: boss.x + boss.w * 0.7 - 4,
      y: boss.y + boss.h,
      w: 10,
      h: 22,
      speed: 4.5
    });
    boss.lastShootTime = now;
    if (bossMaxHp - bossHitCount < 30) {
      boss.shootInterval = 400;
    }
  }

  ctx.fillStyle = "#ff2222";
  enemyBullets.forEach((bullet, index) => {
    bullet.y += bullet.speed;
    ctx.fillRect(bullet.x, bullet.y, bullet.w, bullet.h);
    if (bullet.y > canvasH) enemyBullets.splice(index, 1);
  });

  bullets.forEach((bullet, bulletIdx) => {
    if (
      bullet.x > boss.x &&
      bullet.x < boss.x + boss.w &&
      bullet.y > boss.y &&
      bullet.y < boss.y + boss.h
    ) {
      bossHitCount++;
      bullets.splice(bulletIdx, 1);
      addBoom(bullet.x, bullet.y, 15);
      playBoomSound();
      if (bossHitCount >= bossMaxHp) {
        bossGameWin();
      }
    }
  });

  enemyBullets.forEach((bullet, index) => {
    if (
      bullet.x > player.x &&
      bullet.x < player.x + player.w &&
      bullet.y > player.y &&
      bullet.y < player.y + player.h
    ) {
      bossGameOver();
    }
  });

  if (
    boss.x + boss.w > player.x &&
    boss.x < player.x + player.w &&
    boss.y + boss.h > player.y &&
    boss.y < player.y + player.h
  ) {
    bossGameOver();
  }

  drawBooms();
  ctx.fillStyle = "#fff";
  ctx.font = "16px Microsoft YaHei";
  ctx.fillText(`BOSS战`, 10, 30);
  ctx.fillText(`错词数量：${errorWords.length}个`, 10, 55);
  ctx.fillText(`命中次数：${bossHitCount}/${bossMaxHp}`, 10, 80);
}

$("gameCanvas").addEventListener("touchmove", (e) => {
  e.preventDefault();
  const rect = $("gameCanvas").getBoundingClientRect();
  touchX = e.touches[0].clientX - rect.left;
  initAudio();
});

function gameOver(isDead = true) {
  if (!isGameRunning) return;
  isGameRunning = false;
  clearInterval(gameLoop);
  playOverSound();

  totalRoundKill += killScore;
  saveBestScore(totalRoundKill);
  updateUI();
  
  let alertText = isDead 
    ? `💥 你被敌机击中！\n本次击落：${killScore} 架敌机\n本局累计击落：${totalRoundKill} 架`
    : `⏰ 本关时间到！\n本次击落：${killScore} 架敌机\n本局累计击落：${totalRoundKill} 架`;
  alert(alertText);
  
  if (currentLevel >= 10) {
    if (errorWords.length > 0) {
      loadReviewWords();
    } else {
      alert(`🎉 所有单词全部掌握！即将进入最终BOSS战`);
      setTimeout(() => {
        startBossGame();
      }, 1000);
    }
  } 
  else {
    currentLevel++;
    loadLevelWords();
  }
  
  $("gameCanvas").style.display = "none";
  $("mainUI").style.display = "block";
}

function bossGameOver() {
  if (!isGameRunning) return;
  isGameRunning = false;
  isBossMode = false;
  clearInterval(gameLoop);
  playOverSound();
  
  alert(`遗憾没有通过BOSS关，被敌人击落！
单词总分：${totalWordScore}
累计击落敌机：${totalRoundKill} 架`);
  
  const isContinue = confirm("是否开始新一轮游戏？");
  if (isContinue) {
    initGameRound();
  }
  
  $("gameCanvas").style.display = "none";
  $("mainUI").style.display = "block";
}

function bossGameWin() {
  if (!isGameRunning) return;
  isGameRunning = false;
  isBossMode = false;
  clearInterval(gameLoop);
  const useTime = Math.round((Date.now() - bossStartTime) / 1000);
  addBoom(boss.x + boss.w/2, boss.y + boss.h/2, 100);
  playBoomSound();
  
  setTimeout(() => {
    alert(`恭喜通过BOSS关！
BOSS关用时：${useTime} 秒
单词总分：${totalWordScore}
十关总共击落敌机：${totalRoundKill} 架`);
    
    const isContinue = confirm("是否开始新一轮游戏？");
    if (isContinue) {
      initGameRound();
    }
    
    $("gameCanvas").style.display = "none";
    $("mainUI").style.display = "block";
  }, 500);
}

window.onload = () => {
  const savedAudioState = localStorage.getItem("audioOn");
  if (savedAudioState !== null) {
    isAudioOn = savedAudioState === "true";
  }
  const btn = $("audioBtn");
  if (isAudioOn) {
    btn.textContent = "🔊 音效：已开启";
    btn.classList.remove("off");
  } else {
    btn.textContent = "🔇 音效：已关闭";
    btn.classList.add("off");
  }
  initGameRound();
  loadBestScore();
  document.body.addEventListener("click", initAudio, { once: true });
};
</script>
